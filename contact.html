<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: rgba(255, 255, 255, 0.09);
      --line: rgba(255, 255, 255, 0.2);
      --text: #f6fbff;
      --muted: #a9bdc9;
      --mint: #39f0b4;
      --gold: #ffd166;
      --coral: #ff6b6b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 96px 20px 32px;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 209, 102, 0.22), transparent 29%),
        radial-gradient(circle at 76% 30%, rgba(57, 240, 180, 0.2), transparent 31%),
        radial-gradient(circle at 50% 88%, rgba(255, 107, 107, 0.18), transparent 34%),
        linear-gradient(135deg, #071015 0%, #13252d 55%, #0b171d 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .site-nav {
      position: fixed;
      top: 20px;
      left: 50%;
      z-index: 5;
      display: flex;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(7, 16, 21, 0.62);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(16px);
      transform: translateX(-50%);
    }

    .site-nav a {
      min-width: 86px;
      padding: 10px 14px;
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 800;
      text-align: center;
      text-decoration: none;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .site-nav a:hover,
    .site-nav a[aria-current="page"] {
      background: rgba(255, 255, 255, 0.12);
      color: var(--text);
      transform: translateY(-1px);
    }

    .stage {
      width: min(92vw, 860px);
      padding: clamp(28px, 6vw, 64px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(18px);
    }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--mint);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.7rem, 8vw, 6rem);
      line-height: 0.95;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .accent {
      color: var(--gold);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: 24px;
      margin-top: 34px;
      align-items: start;
    }

    .contact-card,
    form {
      padding: 22px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.07);
    }

    .contact-card p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.65;
    }

    .contact-card a {
      display: block;
      margin-top: 12px;
      color: var(--text);
      font-weight: 800;
      text-decoration-color: rgba(57, 240, 180, 0.65);
      text-underline-offset: 4px;
    }

    label {
      display: block;
      margin-bottom: 14px;
      color: var(--text);
      font-size: 0.92rem;
      font-weight: 800;
    }

    input,
    textarea {
      width: 100%;
      margin-top: 8px;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 6px;
      outline: none;
      background: rgba(7, 16, 21, 0.62);
      color: var(--text);
      font: inherit;
    }

    textarea {
      min-height: 116px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 13px 16px;
      border: 0;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--mint), var(--gold));
      color: #071015;
      cursor: pointer;
      font: inherit;
      font-weight: 900;
      transition: transform 160ms ease, filter 160ms ease;
    }

    button:hover {
      filter: brightness(1.08);
      transform: translateY(-1px);
    }

    @media (max-width: 760px) {
      .contact-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      body {
        padding-top: 92px;
      }

      .site-nav {
        width: calc(100vw - 32px);
      }

      .site-nav a {
        min-width: 0;
        flex: 1;
        padding-inline: 8px;
      }
    }
  </style>
</head>
<body>
  <nav class="site-nav" aria-label="Main navigation">
    <a href="hello-world.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html" aria-current="page">Contact</a>
  </nav>

  <main class="stage">
    <p class="eyebrow">Contact</p>
    <h1>Say <span class="accent">hello</span> anytime.</h1>

    <section class="contact-grid" aria-label="Contact details and message form">
      <div class="contact-card">
        <p>Have an idea, question, or next page to build? This contact page gives the site a friendly place to continue the conversation.</p>
        <a href="mailto:hello@example.com">hello@example.com</a>
        <a href="tel:+1234567890">+1 234 567 890</a>
      </div>

      <form>
        <label>
          Name
          <input type="text" name="name" placeholder="Your name">
        </label>
        <label>
          Email
          <input type="email" name="email" placeholder="you@example.com">
        </label>
        <label>
          Message
          <textarea name="message" placeholder="Write your message"></textarea>
        </label>
        <button type="button">Send Message</button>
      </form>
    </section>
  </main>
</body>
</html>
