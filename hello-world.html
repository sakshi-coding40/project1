<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #071015;
      --panel: rgba(255, 255, 255, 0.09);
      --line: rgba(255, 255, 255, 0.2);
      --text: #f6fbff;
      --muted: #a9bdc9;
      --mint: #39f0b4;
      --gold: #ffd166;
      --coral: #ff6b6b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 18%, rgba(57, 240, 180, 0.22), transparent 28%),
        radial-gradient(circle at 82% 28%, rgba(255, 209, 102, 0.22), transparent 30%),
        radial-gradient(circle at 50% 88%, rgba(255, 107, 107, 0.18), transparent 36%),
        linear-gradient(135deg, #071015 0%, #13252d 55%, #0b171d 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .stage {
      width: min(92vw, 760px);
      padding: clamp(28px, 6vw, 64px);
      position: relative;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(18px);
      text-align: center;
    }

    .stage::before,
    .stage::after {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      pointer-events: none;
    }

    .stage::after {
      inset: auto 28px 28px auto;
      width: 110px;
      height: 110px;
      border-color: rgba(57, 240, 180, 0.45);
      transform: rotate(12deg);
    }

    .eyebrow {
      margin: 0 0 20px;
      color: var(--mint);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 12vw, 7.5rem);
      line-height: 0.9;
      letter-spacing: 0;
      text-wrap: balance;
      text-shadow: 0 10px 40px rgba(57, 240, 180, 0.22);
    }

    .accent {
      display: block;
      color: var(--gold);
    }

    p {
      max-width: 520px;
      margin: 28px auto 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.2vw, 1.18rem);
      line-height: 1.7;
    }

    .sparkles {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 34px;
    }

    .sparkles span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--mint);
      box-shadow: 0 0 28px currentColor;
      animation: pulse 1.8s ease-in-out infinite;
    }

    .sparkles span:nth-child(2) {
      background: var(--gold);
      animation-delay: 0.22s;
    }

    .sparkles span:nth-child(3) {
      background: var(--coral);
      animation-delay: 0.44s;
    }

    @keyframes pulse {
      0%, 100% {
        transform: translateY(0) scale(0.85);
        opacity: 0.55;
      }
      50% {
        transform: translateY(-8px) scale(1.15);
        opacity: 1;
      }
    }

    @media (max-width: 520px) {
      body {
        overflow: auto;
        padding: 24px 0;
      }

      .stage::after {
        width: 74px;
        height: 74px;
      }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="Hello world welcome card">
    <p class="eyebrow">First page energy</p>
    <h1>Hello <span class="accent">World</span></h1>
    <p>A tiny HTML page dressed up with glass, glow, color, and a little motion.</p>
    <div class="sparkles" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </main>
</body>
</html>
